name: Local GPU Titan Queue

on:
  workflow_dispatch: 
  schedule:
    - cron: '0 3 * * *'

permissions:
  contents: write 

jobs:
  run-ai-discovery:
    runs-on: [self-hosted, nvidia-gpu]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Virtual Environment and Dependencies
        run: |
          echo "Creating virtual environment..."
          python3 -m venv venv
          
          echo "Installing dependencies inside venv..."
          # Call the venv's specific pip executable
          venv/bin/pip install --upgrade pip
          venv/bin/pip install -r requirements.txt

      - name: Execute Titan Queue & Export
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
        run: |
          echo "Firing up the RTX 3080 Ti..."
          # Call the venv's specific python executable
          venv/bin/python backend/auto_discover_edges.py --limit 5000
          
          echo "Exporting graph to JSON..."
          venv/bin/python backend/export.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add docs/dashboard_data.json
          
          if ! git diff --cached --quiet; then
            git commit -m "Automated GPU extraction: Updated Supply Chain X-Ray"
            git push origin main
          else
            echo "No new edges discovered today. Skipping commit."
          fi
