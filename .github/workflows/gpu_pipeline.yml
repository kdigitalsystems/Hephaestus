name: Local GPU Titan Queue

on:
  workflow_dispatch: 
  schedule:
    - cron: '0 3 * * *'

permissions:
  contents: write 

jobs:
  run-ai-discovery:
    runs-on: [self-hosted, nvidia-gpu]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Virtual Environment and Dependencies
        run: |
          echo "Creating virtual environment..."
          python3 -m venv venv
          
          echo "Installing dependencies inside venv..."
          venv/bin/pip install --upgrade pip
          venv/bin/pip install -r requirements.txt

      - name: Update Market Metrics
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
        run: |
          # Failsafe: Just in case the DB gets deleted from GitHub, rebuild it.
          if [ ! -f "backend/supply_chain.db" ]; then
            echo "No database found! Bootstrapping from scratch..."
            venv/bin/python backend/database.py
            venv/bin/python backend/seed_db.py
          fi
          
          echo "Updating live financial metrics..."
          venv/bin/python backend/update_metrics.py

      - name: Execute Titan Queue & Export
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
        run: |
          echo "Firing up the RTX 3080 Ti..."
          venv/bin/python backend/auto_discover_edges.py --limit 500
          
          echo "Exporting graph to JSON..."
          venv/bin/python backend/export.py

      - name: Commit and Push Changes (JSON & Database)
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Stage both the frontend JSON and the backend SQLite database
          git add docs/dashboard_data.json
          git add backend/supply_chain.db
          
          if ! git diff --cached --quiet; then
            git commit -m "Automated AI extraction: Updated DB & Supply Chain X-Ray"
            git push origin main
          else
            echo "No new edges discovered today. Skipping commit."
          fi
