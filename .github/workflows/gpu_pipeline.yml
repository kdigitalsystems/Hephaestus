name: Local GPU Titan Queue

on:
  workflow_dispatch: 
  schedule:
    - cron: '0 3 * * *'

permissions:
  contents: write 

jobs:
  run-ai-discovery:
    runs-on: [self-hosted, nvidia-gpu]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Virtual Environment and Dependencies
        run: |
          echo "Creating virtual environment..."
          python3 -m venv venv
          
          echo "Installing dependencies inside venv..."
          venv/bin/pip install --upgrade pip
          venv/bin/pip install -r requirements.txt

      - name: Load or Generate Persistent Database
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
        run: |
          DB_DIR=~/hephaestus_data
          DB_PATH=$DB_DIR/supply_chain.db
          
          mkdir -p $DB_DIR
          
          if [ -f "$DB_PATH" ]; then
            echo "Existing database found in $DB_DIR. Loading into workspace..."
            # FIX 1: Copy it directly into the backend folder where Python expects it
            cp $DB_PATH backend/supply_chain.db
          else
            echo "No database found! Bootstrapping a fresh one..."
            venv/bin/python backend/database.py
            venv/bin/python backend/seed_db.py
            venv/bin/python backend/update_metrics.py
            
            # FIX 2: Copy from the backend folder to the safe haven
            cp backend/supply_chain.db $DB_PATH
          fi

      - name: Execute Titan Queue & Export
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
        run: |
          echo "Firing up the RTX 3080 Ti..."
          venv/bin/python backend/auto_discover_edges.py --limit 5000
          
          echo "Exporting graph to JSON..."
          venv/bin/python backend/export.py

      - name: Save Persistent Database
        run: |
          echo "Saving the AI's new discoveries back to the runner's permanent storage..."
          # FIX 3: Copy from the backend folder back to the safe haven
          cp backend/supply_chain.db ~/hephaestus_data/supply_chain.db

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add docs/dashboard_data.json
          
          if ! git diff --cached --quiet; then
            git commit -m "Automated GPU extraction: Updated Supply Chain X-Ray"
            git push origin main
          else
            echo "No new edges discovered today. Skipping commit."
          fi
