<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supply Chain Intelligence Dashboard</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.26.0/cytoscape.min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #0d1117; /* Dark theme suitable for hardware tracking */
            color: #c9d1d9;
        }
        header {
            padding: 20px;
            background-color: #161b22;
            border-bottom: 1px solid #30363d;
            text-align: center;
        }
        #cy {
            width: 100vw;
            height: calc(100vh - 80px); /* Fill the screen below the header */
            display: block;
        }
        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 1.2rem;
        }
    </style>
</head>
<body>

    <header>
        <h1>Supply Chain Graph</h1>
        <p>Mapping semiconductor dependencies and market signals</p>
    </header>

    <div id="loading" class="loading">Loading dependency data...</div>
    <div id="cy"></div>

    <script>
        // Fetch the static JSON generated by your local 3080 Ti pipeline
        fetch('supply_chain_data.json')
            .then(response => {
                if (!response.ok) {
                    throw new Error("Network response was not ok");
                }
                return response.json();
            })
            .then(data => {
                // Hide loading text
                document.getElementById('loading').style.display = 'none';

                // Initialize Cytoscape
                var cy = cytoscape({
                    container: document.getElementById('cy'),
                    
                    elements: [
                        ...data.nodes,
                        ...data.edges
                    ],

                    style: [
                        {
                            selector: 'node',
                            style: {
                                'background-color': '#58a6ff',
                                'label': 'data(name)',
                                'color': '#c9d1d9',
                                'text-valign': 'center',
                                'text-halign': 'right',
                                'text-margin-x': 10,
                                'font-size': '14px'
                            }
                        },
                        {
                            selector: 'edge',
                            style: {
                                'width': 2,
                                'line-color': '#30363d',
                                'target-arrow-color': '#30363d',
                                'target-arrow-shape': 'triangle',
                                'curve-style': 'bezier',
                                'label': 'data(label)',
                                'font-size': '10px',
                                'color': '#8b949e',
                                'text-rotation': 'autorotate',
                                'text-margin-y': -10
                            }
                        }
                    ],

                    layout: {
                        name: 'cose', // Force-directed layout
                        padding: 50,
                        nodeRepulsion: 400000,
                        idealEdgeLength: 100
                    }
                });
            })
            .catch(error => {
                console.error("Error loading the supply chain data:", error);
                document.getElementById('loading').innerText = "Failed to load data. Make sure export.py has been run.";
            });
    </script>
</body>
</html>
